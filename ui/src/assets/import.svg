<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"
  width="406" height="306" class="illustration">
  <title>Data import</title>

  <!-- ground shadow -->
  <ellipse cx="200" cy="272" rx="158" ry="10" fill="#e6e6e6" opacity="0.45"/>

  <!-- decorative sparkles -->
  <circle cx="58" cy="58" r="2.8" fill="#1C7DD3" opacity="0.35"/>
  <circle cx="44" cy="138" r="2" fill="#1C7DD3" opacity="0.3"/>
  <circle cx="362" cy="184" r="2.6" fill="#1C7DD3" opacity="0.35"/>
  <circle cx="346" cy="74" r="2" fill="#f4a28c" opacity="0.6"/>
  <circle cx="76" cy="220" r="1.8" fill="#FF9800" opacity="0.5"/>
  <path d="M340,30 l4,4 M344,30 l-4,4" stroke="#1C7DD3" stroke-width="1.4" opacity="0.5"/>
  <path d="M28,90 l4,4 M32,90 l-4,4" stroke="#FF9800" stroke-width="1.4" opacity="0.5"/>

  <!-- Cloud (top right, remote source) -->
  <g transform="translate(238,30)">
    <circle cx="18" cy="34" r="22" fill="#1C7DD3"/>
    <circle cx="55" cy="26" r="28" fill="#1C7DD3"/>
    <circle cx="92" cy="36" r="22" fill="#1C7DD3"/>
    <rect x="14" y="40" width="82" height="22" rx="3" fill="#1C7DD3"/>
    <!-- soft highlight -->
    <ellipse cx="42" cy="18" rx="10" ry="4" fill="#fff" opacity="0.22"/>
    <!-- "remote" pin dots inside the cloud -->
    <circle cx="40" cy="46" r="3.4" fill="#fff" opacity="0.85"/>
    <circle cx="55" cy="46" r="3.4" fill="#fff" opacity="0.6"/>
    <circle cx="70" cy="46" r="3.4" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Down arrow guide -->
  <path d="M232 108 L232 184" stroke="#FF9800" stroke-width="2.4" stroke-dasharray="5 5" fill="none" stroke-linecap="round"/>
  <polygon points="222,182 232,200 242,182" fill="#FF9800"/>

  <!-- Documents in flight (data packets going down) -->
  <g transform="translate(178,118) rotate(-8)">
    <rect x="0" y="0" width="36" height="46" rx="3" fill="#fff" stroke="#24285B" stroke-width="2"/>
    <rect x="0" y="0" width="36" height="9" fill="#1C7DD3"/>
    <rect x="6" y="16" width="24" height="2.6" fill="#24285B" opacity="0.45"/>
    <rect x="6" y="22" width="18" height="2.6" fill="#24285B" opacity="0.45"/>
    <rect x="6" y="28" width="22" height="2.6" fill="#24285B" opacity="0.45"/>
    <rect x="6" y="34" width="14" height="2.6" fill="#24285B" opacity="0.45"/>
  </g>
  <g transform="translate(258,146) rotate(12)">
    <rect x="0" y="0" width="30" height="38" rx="3" fill="#fff" stroke="#24285B" stroke-width="2"/>
    <rect x="0" y="0" width="30" height="8" fill="#f4a28c"/>
    <rect x="5" y="14" width="20" height="2.4" fill="#24285B" opacity="0.45"/>
    <rect x="5" y="20" width="16" height="2.4" fill="#24285B" opacity="0.45"/>
    <rect x="5" y="26" width="18" height="2.4" fill="#24285B" opacity="0.45"/>
  </g>

  <!-- Database / server stack (bottom-left, local destination) -->
  <g transform="translate(70,180)">
    <!-- subtle base shadow -->
    <ellipse cx="65" cy="80" rx="60" ry="4.5" fill="#24285B" opacity="0.18"/>

    <!-- bottom unit -->
    <rect x="8" y="52" width="114" height="24" rx="3" fill="#24285B"/>
    <circle cx="22" cy="64" r="3.2" fill="#1C7DD3"/>
    <circle cx="34" cy="64" r="3.2" fill="#1C7DD3" opacity="0.4"/>
    <rect x="54" y="61" width="58" height="6" rx="1.5" fill="#fff" opacity="0.12"/>

    <!-- middle unit -->
    <rect x="8" y="26" width="114" height="24" rx="3" fill="#24285B"/>
    <circle cx="22" cy="38" r="3.2" fill="#FF9800"/>
    <circle cx="34" cy="38" r="3.2" fill="#1C7DD3" opacity="0.4"/>
    <rect x="54" y="35" width="58" height="6" rx="1.5" fill="#fff" opacity="0.12"/>

    <!-- top unit (being filled - highlighted) -->
    <rect x="8" y="0" width="114" height="24" rx="3" fill="#1C7DD3"/>
    <circle cx="22" cy="12" r="3.2" fill="#fff"/>
    <circle cx="34" cy="12" r="3.2" fill="#fff" opacity="0.55"/>
    <rect x="54" y="9" width="58" height="6" rx="1.5" fill="#fff" opacity="0.35"/>

    <!-- progress glow over top unit -->
    <rect x="8" y="0" width="40" height="24" rx="3" fill="#fff" opacity="0.12"/>
  </g>
</svg>
