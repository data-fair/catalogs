<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"
  width="406" height="306" class="illustration">
  <title>Data publication</title>

  <!-- ground shadow -->
  <ellipse cx="200" cy="272" rx="158" ry="10" fill="#e6e6e6" opacity="0.45"/>

  <!-- decorative sparkles -->
  <circle cx="46" cy="64" r="2.8" fill="#1C7DD3" opacity="0.35"/>
  <circle cx="58" cy="148" r="2" fill="#1C7DD3" opacity="0.3"/>
  <circle cx="356" cy="208" r="2.6" fill="#1C7DD3" opacity="0.35"/>
  <circle cx="38" cy="200" r="2" fill="#f4a28c" opacity="0.6"/>
  <circle cx="370" cy="58" r="1.8" fill="#FF9800" opacity="0.55"/>
  <path d="M28,30 l4,4 M32,30 l-4,4" stroke="#1C7DD3" stroke-width="1.4" opacity="0.5"/>
  <path d="M348,140 l4,4 M352,140 l-4,4" stroke="#FF9800" stroke-width="1.4" opacity="0.5"/>

  <!-- Globe (top right, remote destination, broadcasting) -->
  <g transform="translate(280,42)">
    <!-- broadcast arcs -->
    <path d="M -22 30 A 50 50 0 0 1 -22 -10" stroke="#1C7DD3" stroke-width="1.8" fill="none" opacity="0.6" stroke-dasharray="3 3"/>
    <path d="M -34 38 A 64 64 0 0 1 -34 -18" stroke="#1C7DD3" stroke-width="1.6" fill="none" opacity="0.35" stroke-dasharray="3 4"/>
    <path d="M 70 30 A 50 50 0 0 0 70 -10" stroke="#1C7DD3" stroke-width="1.8" fill="none" opacity="0.6" stroke-dasharray="3 3"/>
    <path d="M 82 38 A 64 64 0 0 0 82 -18" stroke="#1C7DD3" stroke-width="1.6" fill="none" opacity="0.35" stroke-dasharray="3 4"/>

    <!-- globe sphere -->
    <circle cx="24" cy="10" r="32" fill="#24285B"/>
    <!-- highlight -->
    <ellipse cx="14" cy="-2" rx="9" ry="4" fill="#fff" opacity="0.18"/>

    <!-- latitude lines -->
    <ellipse cx="24" cy="10" rx="32" ry="9" fill="none" stroke="#1C7DD3" stroke-width="1.4" opacity="0.85"/>
    <ellipse cx="24" cy="10" rx="32" ry="20" fill="none" stroke="#1C7DD3" stroke-width="1.1" opacity="0.55"/>

    <!-- meridian -->
    <ellipse cx="24" cy="10" rx="11" ry="32" fill="none" stroke="#1C7DD3" stroke-width="1.4" opacity="0.85"/>
    <line x1="24" y1="-22" x2="24" y2="42" stroke="#1C7DD3" stroke-width="1.4" opacity="0.85"/>

    <!-- location pin -->
    <circle cx="34" cy="2" r="3" fill="#FF9800"/>
    <circle cx="34" cy="2" r="6" fill="#FF9800" opacity="0.25"/>
  </g>

  <!-- Up arrow guide -->
  <path d="M168 196 L168 122" stroke="#FF9800" stroke-width="2.4" stroke-dasharray="5 5" fill="none" stroke-linecap="round"/>
  <polygon points="158,124 168,106 178,124" fill="#FF9800"/>

  <!-- Documents in flight (data packets going up) -->
  <g transform="translate(116,148) rotate(-12)">
    <rect x="0" y="0" width="32" height="40" rx="3" fill="#fff" stroke="#24285B" stroke-width="2"/>
    <rect x="0" y="0" width="32" height="8" fill="#f4a28c"/>
    <rect x="5" y="14" width="22" height="2.4" fill="#24285B" opacity="0.45"/>
    <rect x="5" y="20" width="16" height="2.4" fill="#24285B" opacity="0.45"/>
    <rect x="5" y="26" width="18" height="2.4" fill="#24285B" opacity="0.45"/>
  </g>
  <g transform="translate(196,128) rotate(8)">
    <rect x="0" y="0" width="36" height="46" rx="3" fill="#fff" stroke="#24285B" stroke-width="2"/>
    <rect x="0" y="0" width="36" height="9" fill="#1C7DD3"/>
    <rect x="6" y="16" width="24" height="2.6" fill="#24285B" opacity="0.45"/>
    <rect x="6" y="22" width="18" height="2.6" fill="#24285B" opacity="0.45"/>
    <rect x="6" y="28" width="22" height="2.6" fill="#24285B" opacity="0.45"/>
    <rect x="6" y="34" width="14" height="2.6" fill="#24285B" opacity="0.45"/>
  </g>

  <!-- Database / server stack (bottom-left, local source - matches import for visual pairing) -->
  <g transform="translate(70,180)">
    <!-- subtle base shadow -->
    <ellipse cx="65" cy="80" rx="60" ry="4.5" fill="#24285B" opacity="0.18"/>

    <!-- bottom unit -->
    <rect x="8" y="52" width="114" height="24" rx="3" fill="#24285B"/>
    <circle cx="22" cy="64" r="3.2" fill="#1C7DD3"/>
    <circle cx="34" cy="64" r="3.2" fill="#1C7DD3" opacity="0.4"/>
    <rect x="54" y="61" width="58" height="6" rx="1.5" fill="#fff" opacity="0.12"/>

    <!-- middle unit -->
    <rect x="8" y="26" width="114" height="24" rx="3" fill="#24285B"/>
    <circle cx="22" cy="38" r="3.2" fill="#FF9800"/>
    <circle cx="34" cy="38" r="3.2" fill="#1C7DD3" opacity="0.4"/>
    <rect x="54" y="35" width="58" height="6" rx="1.5" fill="#fff" opacity="0.12"/>

    <!-- top unit (active, broadcasting) -->
    <rect x="8" y="0" width="114" height="24" rx="3" fill="#1C7DD3"/>
    <circle cx="22" cy="12" r="3.2" fill="#fff"/>
    <circle cx="34" cy="12" r="3.2" fill="#fff" opacity="0.55"/>
    <rect x="54" y="9" width="58" height="6" rx="1.5" fill="#fff" opacity="0.35"/>

    <!-- upload glow on right side of top unit -->
    <rect x="82" y="0" width="40" height="24" rx="3" fill="#fff" opacity="0.12"/>
  </g>
</svg>
