services:

  #####
  # reverse proxy for the whole environment
  #####

  nginx:
    profiles:
      - dev
    image: nginx:1.29.4-alpine
    network_mode: host
    environment:
      - DEV_HOST=${DEV_HOST}
      - NGINX_PORT=${NGINX_PORT}
      - DEV_API_PORT=${DEV_API_PORT}
      - DEV_UI_PORT=${DEV_UI_PORT}
      - SD_PORT=${SD_PORT}
      - DF_PORT=${DF_PORT}
      - EVENTS_PORT=${EVENTS_PORT}
    volumes:
      - ./dev/resources/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro

  #####
  # required services from the data-fair stack
  #####

  simple-directory:
    profiles:
      - dev
    image: ghcr.io/data-fair/simple-directory:master
    network_mode: host
    depends_on:
      - mongo
    environment:
      - ADMINS=["superadmin@test.com","test_superadmin@test.com"]
      - CIPHER_PASSWORD=dev
      - CONTACT=contact@test.com
      - MANAGE_DEPARTMENTS=true
      - PORT=${SD_PORT}
      - MONGO_URL=mongodb://localhost:${MONGO_PORT}/simple-directory
      - OBSERVER_ACTIVE=false
      - PUBLIC_URL=http://${DEV_HOST}:${NGINX_PORT}/simple-directory
      - IDENTITIES_WEBHOOKS=[{"base":"http://localhost:${EVENTS_PORT}/api/v1/identities","key":"secret-identities"},{"base":"http://${DEV_HOST}:${NGINX_PORT}/catalogs/api/identities","key":"secret-identities"}]
      - STORAGE_TYPE=file
      # When we test permissions, we need to authenticate many users from the same IP.
      - AUTHRATELIMIT_ATTEMPTS=500
      - AUTHRATELIMIT_DURATION=30
    volumes:
      - ./dev/resources/users.json:/app/data/users.json
      - ./dev/resources/organizations.json:/app/data/organizations.json

  data-fair:
    profiles:
      - dev
    image: ghcr.io/data-fair/data-fair:master
    restart: on-failure:10
    network_mode: host
    depends_on:
      mongo:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      - PORT=${DF_PORT}
      - MONGO_URL=mongodb://localhost:${MONGO_PORT}/data-fair
      - ES_HOST=http://localhost:${ES_PORT}
      - DIRECTORY_URL=http://${DEV_HOST}:${NGINX_PORT}/simple-directory
      - PRIVATE_EVENTS_URL=http://localhost:${EVENTS_PORT}
      - PRIVATE_DIRECTORY_URL=http://localhost:${SD_PORT}
      - PUBLIC_URL=http://${DEV_HOST}:${NGINX_PORT}/data-fair
      - WS_PUBLIC_URL=ws://${DEV_HOST}:${NGINX_PORT}/data-fair
      - OBSERVER_ACTIVE=false

      - PRIVATE_CATALOGS_URL=http://${DEV_HOST}:${NGINX_PORT}/catalogs
      - SECRET_CATALOGS=secret-catalogs

  #####
  # optional services
  #####

  events:
    profiles:
      - dev
    image: ghcr.io/data-fair/events:main
    network_mode: host
    depends_on:
      - mongo
    environment:
      - PORT=${EVENTS_PORT}
      - MONGO_URL=mongodb://localhost:${MONGO_PORT}/data-fair-events
      - PRIVATE_DIRECTORY_URL=http://${DEV_HOST}:${NGINX_PORT}/simple-directory
      - SECRET_IDENTITIES=secret-identities
      - SECRET_EVENTS=secret-events
      - SECRET_SENDMAILS=secret-sendmails
      - OBSERVER_ACTIVE=false

  #####
  # db and search engine
  #####
  elasticsearch:
    profiles:
      - dev
    image: ghcr.io/data-fair/elasticsearch:7.x
    ports:
      - ${ES_PORT}:9200
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms128m -Xmx128m -server
      - ES_HEAP_SIZE=128m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      start_period: 10s
      timeout: 5s
      interval: 2s
      retries: 50

  mongo:
    profiles:
      - dev
    image: mongo:4.2
    ports:
      - ${MONGO_PORT}:27017
    volumes:
      - mongo-data:/data/db

volumes:
  elasticsearch-data:
  mongo-data:
